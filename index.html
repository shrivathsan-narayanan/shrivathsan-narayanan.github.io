    <div id="lightbox-caption"></div>
</div>

<script>

const activeSubTab = {
    Thesis:   "Numerical",
    Projects: "HPC"
};

const hasSubnav = ["Thesis", "Projects"];

const fileMap = {
    Home:           "1_home.html",
    Numerical:      "2a_numerical.html",
    Experimental:   "2b_experimental.html",
    HPC:            "3a_hpc.html",
    NeuralNetworks: "3b_nn.html",
    Publications:   "4_publications.html",
    Awards:         "5_awards.html"
};

async function loadContent(name) {
    const el = document.getElementById(name);
    if (el.dataset.loaded) return;
    const res = await fetch("tabs/" + fileMap[name]);
    el.innerHTML = await res.text();
    el.dataset.loaded = "true";
}

function hideAllContent() {
    document.querySelectorAll(".tabcontent").forEach(el => el.style.display = "none");
}

function hideAllSubnavs() {
    document.querySelectorAll(".subnav").forEach(el => el.classList.remove("visible"));
}

function openTab(evt, tabName) {
    hideAllContent();
    hideAllSubnavs();
    document.querySelectorAll(".tablink").forEach(el => el.classList.remove("active"));
    evt.currentTarget.classList.add("active");

    if (hasSubnav.includes(tabName)) {
        document.getElementById("subnav-" + tabName).classList.add("visible");
        const sub = activeSubTab[tabName];
        loadContent(sub).then(() => {
            hideAllContent();
            document.getElementById(sub).style.display = "block";
            window.scrollTo({ top: 0, behavior: "smooth" });
        });
    } else {
        loadContent(tabName).then(() => {
            document.getElementById(tabName).style.display = "block";
            window.scrollTo({ top: 0, behavior: "smooth" });
        });
    }
}

function openSubTab(evt, parentName, subName) {
    activeSubTab[parentName] = subName;
    document.querySelectorAll("#subnav-" + parentName + " .sublink")
        .forEach(el => el.classList.remove("active"));
    evt.currentTarget.classList.add("active");
    loadContent(subName).then(() => {
        hideAllContent();
        document.getElementById(subName).style.display = "block";
        window.scrollTo({ top: 0, behavior: "smooth" });
    });
}

function openLightbox(src, caption) {
    document.getElementById("lightbox-img").src = src;
    document.getElementById("lightbox-caption").textContent = caption;
    document.getElementById("lightbox").classList.add("open");
    document.body.style.overflow = "hidden";
}

function closeLightbox() {
    document.getElementById("lightbox").classList.remove("open");
    document.body.style.overflow = "";
}

document.getElementById("lightbox").addEventListener("click", function(e) {
    if (e.target === this) closeLightbox();
});

document.addEventListener("keydown", function(e) {
    if (e.key === "Escape") closeLightbox();
});

window.onload = function () {
    document.getElementById("defaultOpen").click();
};

</script>
